<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Rentoo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">Rentoo</a>
            <div class="flex items-center space-x-4">
                <a href="profile.html" class="text-gray-600 hover:text-blue-600 font-medium">My Profile</a>
                <span id="welcomeMessage" class="text-gray-700 font-medium"></span>
                <button id="logOutButton" class="bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600">Log Out</button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">My Dashboard</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: My Properties -->
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4">My Listed Properties</h2>
                <div id="my-properties-list" class="space-y-4">
                    <!-- Properties will be dynamically inserted here -->
                </div>
            </div>

            <!-- Right Column: Add New Property Form -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4">Add a New Property</h2>
                <form id="addPropertyForm" class="space-y-4">
                    <input type="text" name="address" placeholder="Address" class="w-full px-4 py-2 border rounded-md" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" name="city" placeholder="City" class="w-full px-4 py-2 border rounded-md" required>
                        <input type="text" name="state" placeholder="State" class="w-full px-4 py-2 border rounded-md" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" name="zipCode" placeholder="Zip Code" class="w-full px-4 py-2 border rounded-md" required>
                        <input type="number" name="rentPrice" placeholder="Rent Price ($)" class="w-full px-4 py-2 border rounded-md" required step="0.01">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" name="bedrooms" placeholder="Bedrooms" class="w-full px-4 py-2 border rounded-md" required>
                        <input type="number" name="bathrooms" placeholder="Bathrooms" class="w-full px-4 py-2 border rounded-md" required>
                    </div>
                    <textarea name="description" placeholder="Description" rows="4" class="w-full px-4 py-2 border rounded-md" required></textarea>
                    
                    <div>
                        <label for="file-upload" class="block text-sm font-medium text-gray-700">Upload Multiple Images</label>
                        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md">
                            <div class="space-y-1 text-center">
                                <i class="fas fa-image text-4xl text-gray-400"></i>
                                <div class="flex text-sm text-gray-600">
                                    <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                        <span>Click to upload files</span>
                                        <input id="file-upload" name="files" type="file" class="sr-only" multiple>
                                    </label>
                                </div>
                                <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
                            </div>
                        </div>
                    </div>
                    <div id="image-preview" class="grid grid-cols-3 gap-2"></div>

                    <div>
                        <label for="video-url" class="block text-sm font-medium text-gray-700">Surrounding Area Video URL (Optional)</label>
                        <input type="url" name="videoUrl" id="video-url" placeholder="https://www.youtube.com/watch?v=..." class="mt-1 w-full px-4 py-2 border rounded-md">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">Add Property</button>
                    <p id="addPropertyMessage" class="text-center text-sm mt-4"></p>
                </form>
            </div>
        </div>
    </main>

    <!-- Edit Property Modal -->
    <div id="editPropertyModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-lg">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Edit Property</h2>
                <button id="closeEditModal" class="text-gray-500 hover:text-gray-800 text-3xl">&times;</button>
            </div>
            <form id="editPropertyForm" class="space-y-4">
                <input type="hidden" name="id">
                <input type="text" name="address" placeholder="Address" class="w-full px-4 py-2 border rounded-md" required>
                <div class="grid grid-cols-2 gap-4"><input type="text" name="city" placeholder="City" class="w-full px-4 py-2 border rounded-md" required><input type="text" name="state" placeholder="State" class="w-full px-4 py-2 border rounded-md" required></div>
                <div class="grid grid-cols-2 gap-4"><input type="text" name="zipCode" placeholder="Zip Code" class="w-full px-4 py-2 border rounded-md" required><input type="number" name="rentPrice" placeholder="Rent Price ($)" class="w-full px-4 py-2 border rounded-md" required step="0.01"></div>
                <div class="grid grid-cols-2 gap-4"><input type="number" name="bedrooms" placeholder="Bedrooms" class="w-full px-4 py-2 border rounded-md" required><input type="number" name="bathrooms" placeholder="Bathrooms" class="w-full px-4 py-2 border rounded-md" required></div>
                <textarea name="description" placeholder="Description" rows="4" class="w-full px-4 py-2 border rounded-md" required></textarea>
                <div><label for="edit-video-url" class="block text-sm font-medium text-gray-700">Surrounding Area Video URL (Optional)</label><input type="url" name="videoUrl" id="edit-video-url" placeholder="https://www.youtube.com/watch?v=..." class="mt-1 w-full px-4 py-2 border rounded-md"></div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700">Save Changes</button>
                <p id="editPropertyMessage" class="text-center text-sm mt-4"></p>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Are you sure?</h2>
            <p class="text-gray-600 mb-6">This action cannot be undone. All data for this property will be permanently deleted.</p>
            <div class="flex justify-center space-x-4">
                <button id="cancelDeleteButton" class="bg-gray-300 text-gray-800 px-6 py-2 rounded-md hover:bg-gray-400">Cancel</button>
                <button id="confirmDeleteButton" class="bg-red-600 text-white px-6 py-2 rounded-md hover:bg-red-700">Delete</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
