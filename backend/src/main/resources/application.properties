# ===================================================================
# RENTOO DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/rentoo_db
spring.datasource.username=postgres
spring.datasource.password=xxxxxxxxx

# ===================================================================
# JPA & HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# JWT (JSON Web Token) Configuration
# ===================================================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B62506xxxxxxxx
application.security.jwt.expiration=86400000

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===================================================================
# LOGGING CONFIGURATION (NEW)
# ===================================================================
# Enable DEBUG logging to see more details about incoming requests.
logging.level.org.springframework=DEBUG
